<!DOCTYPE html>
<html lang="de">
<head>
	<link rel="manifest" href="manifest.json">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koran Suche - Smart & Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #166534; margin-bottom: 10px; }
        
        #status { text-align: center; font-size: 13px; margin-bottom: 15px; padding: 8px; border-radius: 6px; transition: 0.3s; }
        .loading { background: #fef9c3; color: #854d0e; }
        .ready { background: #dcfce7; color: #166534; }
        
        .search-wrapper { position: relative; margin-bottom: 10px; }
        input { 
            width: 100%; padding: 15px; border: 2px solid #e5e7eb; border-radius: 10px; 
            font-size: 18px; outline: none; box-sizing: border-box; 
        }
        input:focus { border-color: #166534; }

        /* Trefferanzeige Styling */
        #stats { font-size: 14px; color: #64748b; margin-bottom: 20px; font-weight: 600; min-height: 20px; }
        
        .result-item { border-bottom: 1px solid #f1f5f9; padding: 25px 0; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .arabic { font-family: 'Amiri', serif; font-size: 32px; text-align: right; direction: rtl; display: block; color: #111; line-height: 1.8; margin-bottom: 12px; }
        .german { font-size: 17px; color: #4b5563; line-height: 1.6; border-left: 3px solid #166534; padding-left: 15px; }
        .meta { font-size: 11px; color: #94a3b8; margin-top: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📖 Koran Suchmaschine</h1>
    <div id="status" class="loading">Daten werden vorbereitet...</div>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Suchwort (Deutsch oder Arabisch)..." oninput="autoSearch()">
    </div>
    
    <div id="stats"></div>

    <div id="results"></div>
</div>

<script>
    let quranData = [];

    function cleanAr(text) {
        return text.replace(/[\u064B-\u065F\u0670]/g, "").replace(/أ|إ|آ/g, "ا").replace(/ة/g, "ه").toLowerCase();
    }

    function isArabic(text) {
        return /[\u0600-\u06FF]/.test(text);
    }

    async function init() {
        const status = document.getElementById('status');
        try {
            const [deRes, arRes] = await Promise.all([
                fetch('https://api.alquran.cloud/v1/quran/de.aburida'),
                fetch('https://api.alquran.cloud/v1/quran/quran-simple')
            ]);

            const deJSON = await deRes.json();
            const arJSON = await arRes.json();

            quranData = deJSON.data.surahs.flatMap((surah, sIdx) => 
                surah.ayahs.map((ayah, aIdx) => ({
                    sNum: surah.number,
                    sName: surah.name,
                    aNum: ayah.numberInSurah,
                    deText: ayah.text,
                    arText: arJSON.data.surahs[sIdx].ayahs[aIdx].text,
                    arClean: cleanAr(arJSON.data.surahs[sIdx].ayahs[aIdx].text)
                }))
            );

            status.innerText = "✅ System bereit";
            status.className = "ready";
        } catch (err) {
            status.innerText = "❌ Fehler beim Laden.";
            status.className = "error";
        }
    }

    function autoSearch() {
        const input = document.getElementById('searchInput');
        const query = input.value.trim();
        const resDiv = document.getElementById('results');
        const statsDiv = document.getElementById('stats');
        
        // Richtung anpassen
        input.style.direction = isArabic(query) ? "rtl" : "ltr";
        input.style.textAlign = isArabic(query) ? "right" : "left";

        if (query.length < 2) {
            resDiv.innerHTML = "";
            statsDiv.innerText = "";
            return;
        }

        const filtered = quranData.filter(item => {
            if (isArabic(query)) {
                return item.arClean.includes(cleanAr(query));
            } else {
                return item.deText.toLowerCase().includes(query.toLowerCase());
            }
        });

        // Trefferzahl anzeigen
        statsDiv.innerText = `Gefundene Treffer: ${filtered.length}`;

        resDiv.innerHTML = "";
        // Wir zeigen alle an, aber begrenzen für die Performance auf die ersten 100
        filtered.slice(0, 100).forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <div class="arabic">${item.arText}</div>
                <div class="german">${item.deText}</div>
                <div class="meta">Sure ${item.sNum} (${item.sName}) | Vers ${item.aNum}</div>
            `;
            resDiv.appendChild(div);
        });
    }

    init();
</script>

</body>
</html>
