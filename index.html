<!DOCTYPE html>
<html lang="de">
<head>
	<link rel="manifest" href="manifest.json">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koran Suche - Smart & Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; color: #333; }
    .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h1 { text-align: center; color: #166534; font-size: 22px; margin-bottom: 5px; }
    
    #status { text-align: center; font-size: 12px; margin-bottom: 10px; padding: 5px; border-radius: 4px; }
    .loading { background: #fef9c3; color: #854d0e; }
    .ready { background: #dcfce7; color: #166534; }
    
    .search-wrapper { margin-bottom: 10px; }
    input { 
        width: 100%; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; 
        font-size: 15px; outline: none; box-sizing: border-box; 
    }
    
    #stats { font-size: 12px; color: #64748b; margin-bottom: 15px; font-weight: 600; }
    
    .result-item { border-bottom: 1px solid #f1f5f9; padding: 15px 0; }
    
    /* Arabisch etwas kleiner (von 32px auf 26px) */
    .arabic { 
        font-family: 'Amiri', serif; 
        font-size: 16px; 
        text-align: right; 
        direction: rtl; 
        display: block; 
        color: #111; 
        line-height: 1.6; 
        margin-bottom: 8px; 
    }
    
    /* Deutsch etwas kleiner (von 18px auf 15px) */
    .german { 
        font-size: 15px; 
        color: #4b5563; 
        line-height: 1.5; 
        border-left: 3px solid #166534; 
        padding-left: 12px; 
    }
    
    .meta { font-size: 10px; color: #94a3b8; margin-top: 10px; text-transform: uppercase; }
</style>
</head>
<body>

<div class="container">
    <h1>📖 Koran Suchmaschine</h1>
    <div id="status" class="loading">Daten werden vorbereitet...</div>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Suchwort (Deutsch oder Arabisch)..." oninput="autoSearch()">
    </div>
    
    <div id="stats"></div>

    <div id="results"></div>
</div>

<script>
    let quranData = [];

    function cleanAr(text) {
        return text.replace(/[\u064B-\u065F\u0670]/g, "").replace(/أ|إ|آ/g, "ا").replace(/ة/g, "ه").toLowerCase();
    }

    function isArabic(text) {
        return /[\u0600-\u06FF]/.test(text);
    }

    async function init() {
        const status = document.getElementById('status');
        try {
            const [deRes, arRes] = await Promise.all([
                fetch('https://api.alquran.cloud/v1/quran/de.aburida'),
                fetch('https://api.alquran.cloud/v1/quran/quran-simple')
            ]);

            const deJSON = await deRes.json();
            const arJSON = await arRes.json();

            quranData = deJSON.data.surahs.flatMap((surah, sIdx) => 
                surah.ayahs.map((ayah, aIdx) => ({
                    sNum: surah.number,
                    sName: surah.name,
                    aNum: ayah.numberInSurah,
                    deText: ayah.text,
                    arText: arJSON.data.surahs[sIdx].ayahs[aIdx].text,
                    arClean: cleanAr(arJSON.data.surahs[sIdx].ayahs[aIdx].text)
                }))
            );

            status.innerText = "✅ System bereit";
            status.className = "ready";
        } catch (err) {
            status.innerText = "❌ Fehler beim Laden.";
            status.className = "error";
        }
    }

    function autoSearch() {
        const input = document.getElementById('searchInput');
        const query = input.value.trim();
        const resDiv = document.getElementById('results');
        const statsDiv = document.getElementById('stats');
        
        // Richtung anpassen
        input.style.direction = isArabic(query) ? "rtl" : "ltr";
        input.style.textAlign = isArabic(query) ? "right" : "left";

        if (query.length < 2) {
            resDiv.innerHTML = "";
            statsDiv.innerText = "";
            return;
        }

        const filtered = quranData.filter(item => {
            if (isArabic(query)) {
                return item.arClean.includes(cleanAr(query));
            } else {
                return item.deText.toLowerCase().includes(query.toLowerCase());
            }
        });

        // Trefferzahl anzeigen
        statsDiv.innerText = `Gefundene Treffer: ${filtered.length}`;

        resDiv.innerHTML = "";
        // Wir zeigen alle an, aber begrenzen für die Performance auf die ersten 100
        filtered.slice(0, 100).forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <div class="arabic">${item.arText}</div>
                <div class="german">${item.deText}</div>
                <div class="meta">Sure ${item.sNum} (${item.sName}) | Vers ${item.aNum}</div>
            `;
            resDiv.appendChild(div);
        });
    }

    init();
</script>

</body>
</html>
