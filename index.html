<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koran Suche Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#166534">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="quran.png">
    <link rel="apple-touch-icon" href="quran.png">

    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; color: #333; margin: 0; }
        .container { max-width: 850px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #166534; font-size: 24px; }
        
        #status { text-align: center; font-size: 12px; margin-bottom: 15px; padding: 5px; border-radius: 6px; }
        .loading { background: #fef9c3; color: #854d0e; }
        .ready { background: #dcfce7; color: #166534; }
        
        .search-wrapper { position: sticky; top: 10px; z-index: 100; background: white; padding: 5px 0; }
        input { 
            width: 100%; padding: 15px; border: 2px solid #e5e7eb; border-radius: 12px; 
            font-size: 18px; outline: none; box-sizing: border-box; transition: 0.2s;
        }
        input:focus { border-color: #166534; box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.1); }

        #stats { font-size: 13px; color: #64748b; margin: 10px 0; font-weight: 600; }
        
        .result-item { border-bottom: 1px solid #f1f5f9; padding: 20px 0; }
        .arabic { font-family: 'Amiri', serif; font-size: 28px; text-align: right; direction: rtl; color: #111; line-height: 1.8; margin-bottom: 10px; }
        .german { font-size: 16px; color: #4b5563; line-height: 1.5; border-left: 3px solid #166534; padding-left: 12px; }
        .meta { font-size: 11px; color: #94a3b8; margin-top: 10px; text-transform: uppercase; }

        /* Highlighting */
        mark {
            background-color: #bbf7d0;
            color: #14532d;
            border-radius: 3px;
            padding: 0 2px;
            font-weight: 600;
        }
        .arabic mark {
            background-color: #bbf7d0;
            color: #14532d;
            font-weight: normal;
        }

        @media (max-width: 600px) {
            .container { border-radius: 0; box-shadow: none; padding: 15px; }
            body { background: white; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📖 Koran Suche</h1>
    <div id="status" class="loading">Wird geladen...</div>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Suchen..." oninput="autoSearch()">
    </div>
    
    <div id="stats"></div>
    <div id="results"></div>
</div>

<script>
    let quranData = [];

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("Service Worker aktiv"));
    }

    function cleanAr(text) {
        return text.replace(/[\u064B-\u065F\u0670]/g, "").replace(/أ|إ|آ/g, "ا").replace(/ة/g, "ه").toLowerCase();
    }

    function isArabic(text) { return /[\u0600-\u06FF]/.test(text); }

    /**
     * Hebt alle Vorkommen von `query` im `text` hervor.
     * Gibt einen HTML-String mit <mark>-Tags zurück.
     * Für arabische Texte wird der bereinigte Text für die Suche verwendet,
     * aber der Originaltext für die Anzeige beibehalten.
     */
    function highlight(text, query, arabic = false) {
        if (!query || query.length < 2) return text;

        if (arabic) {
            // Für arabischen Text: Suche im bereinigten Text, hebe im Original hervor
            const cleanQuery = cleanAr(query);
            const cleanText = cleanAr(text);
            
            // Finde alle Positionen im bereinigten Text
            const positions = [];
            let idx = 0;
            while ((idx = cleanText.indexOf(cleanQuery, idx)) !== -1) {
                positions.push(idx);
                idx += cleanQuery.length;
            }
            if (positions.length === 0) return text;

            // Baue den Original-Text mit <mark>-Tags
            // Da bereinigte und originale Zeichen nicht 1:1 übereinstimmen,
            // verwenden wir einen zeichenweisen Ansatz
            const cleanChars = [...cleanText];
            const origChars = [...text];

            // Mappe Original-Indizes auf bereinigte Indizes
            const origToClean = [];
            let cleanIdx = 0;
            for (let i = 0; i < origChars.length; i++) {
                const origChar = origChars[i];
                const isVowel = /[\u064B-\u065F\u0670]/.test(origChar);
                if (isVowel) {
                    origToClean.push(cleanIdx); // Vokale überspringen
                } else {
                    origToClean.push(cleanIdx);
                    cleanIdx++;
                }
            }

            // Markierte Positionen (im bereinigten Text)
            const markedClean = new Set();
            for (const pos of positions) {
                for (let j = pos; j < pos + cleanQuery.length; j++) {
                    markedClean.add(j);
                }
            }

            // Original-Text mit <mark>-Tags aufbauen
            let result = '';
            let inMark = false;
            for (let i = 0; i < origChars.length; i++) {
                const isVowel = /[\u064B-\u065F\u0670]/.test(origChars[i]);
                const cIdx = isVowel ? origToClean[i] : origToClean[i];
                const shouldMark = markedClean.has(cIdx) && !isVowel;

                if (shouldMark && !inMark) { result += '<mark>'; inMark = true; }
                if (!shouldMark && inMark) { result += '</mark>'; inMark = false; }
                result += origChars[i];
            }
            if (inMark) result += '</mark>';
            return result;
        } else {
            // Für deutschen Text: einfaches case-insensitives Highlighting
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedQuery})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }
    }

    async function init() {
        const status = document.getElementById('status');
        try {
            const [deRes, arRes] = await Promise.all([
                fetch('https://api.alquran.cloud/v1/quran/de.aburida'),
                fetch('https://api.alquran.cloud/v1/quran/quran-simple')
            ]);
            const deJSON = await deRes.json();
            const arJSON = await arRes.json();

            quranData = deJSON.data.surahs.flatMap((surah, sIdx) => 
                surah.ayahs.map((ayah, aIdx) => ({
                    sNum: surah.number,
                    sName: surah.name,
                    aNum: ayah.numberInSurah,
                    deText: ayah.text,
                    arText: arJSON.data.surahs[sIdx].ayahs[aIdx].text,
                    arClean: cleanAr(arJSON.data.surahs[sIdx].ayahs[aIdx].text)
                }))
            );

            status.innerText = "✨ App bereit";
            status.className = "ready";
        } catch (err) {
            status.innerText = "Verbindung prüfen...";
        }
    }

    function autoSearch() {
        const input = document.getElementById('searchInput');
        const query = input.value.trim();
        const resDiv = document.getElementById('results');
        const statsDiv = document.getElementById('stats');
        const arabic = isArabic(query);
        
        input.style.direction = arabic ? "rtl" : "ltr";

        if (query.length < 2) { resDiv.innerHTML = ""; statsDiv.innerText = ""; return; }

        const filtered = quranData.filter(item => 
            arabic
                ? item.arClean.includes(cleanAr(query))
                : item.deText.toLowerCase().includes(query.toLowerCase())
        );

        statsDiv.innerText = `${filtered.length} Treffer`;
        resDiv.innerHTML = filtered.slice(0, 100).map(item => `
            <div class="result-item">
                <div class="arabic">${highlight(item.arText, arabic ? query : '', true)}</div>
                <div class="german">${highlight(item.deText, arabic ? '' : query, false)}</div>
                <div class="meta">Sure ${item.sNum} | Vers ${item.aNum}</div>
            </div>
        `).join('');
    }

    init();
</script>

</body>
</html>
